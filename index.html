<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#414c57">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minesweeper</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/maskable-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="stage">
      <main class="phone" aria-label="Minesweeper game">
        <header class="topbar">
          <div class="counter counter-current">
            <span>CURRENT STREAK</span>
            <strong id="currentStreak">0</strong>
          </div>

          <div class="crowned-counter">
            <svg class="crown" viewBox="0 0 44 18" aria-hidden="true">
              <path d="M0 14h14L22 0l8 14h14v4H0z"/>
            </svg>
            <div class="counter counter-all">
              <span>ALL TIME</span>
              <strong id="allTime">0</strong>
            </div>
          </div>

          <button class="round-button reset-button" type="button" aria-label="New board" title="New board">
            <svg viewBox="0 0 40 40" aria-hidden="true">
              <path d="M13.7 23.2a8.4 8.4 0 1 0 .7-7.4" fill="none" stroke="currentColor" stroke-width="4.6" stroke-linecap="round"/>
              <path d="M10.2 15.7h7.3v7.1" fill="none" stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </header>

        <section id="board" class="board" aria-label="Minesweeper board"></section>

        <footer class="toolbar">
          <div class="mine-pill" aria-label="Mines">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M16 6.7v-4M16 29.3v-4M6.7 16h-4M29.3 16h-4M9.4 9.4 6.6 6.6M25.4 25.4l-2.8-2.8M22.6 9.4l2.8-2.8M6.6 25.4l2.8-2.8" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <path d="M16 7.6a8.4 8.4 0 1 0 0 16.8 8.4 8.4 0 0 0 0-16.8z"/>
              <circle cx="20.4" cy="11.5" r="2.2" fill="#98aaba"/>
            </svg>
            <strong id="mineCount">0</strong>
          </div>

          <div class="mode-switch" role="group" aria-label="Tool mode">
            <button id="digMode" class="tool-button" type="button" aria-label="Reveal mode" title="Reveal">
              <svg viewBox="0 0 44 44" aria-hidden="true">
                <path d="M14.2 26.2 28.9 11.5l3.7 3.7L17.9 29.9z" fill="currentColor"/>
                <path d="m30.5 9.8 2.2-2.2 4.8 4.8-2.2 2.2z" fill="currentColor"/>
                <path d="M11.4 26.7a8.2 8.2 0 0 0 10.9 10.9l-1.8-6.2-6.8-6.5z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="flagMode" class="tool-button selected" type="button" aria-label="Flag mode" title="Flag">
              <svg viewBox="0 0 44 44" aria-hidden="true">
                <path d="M28 7.5v29" fill="none" stroke="currentColor" stroke-width="4.2" stroke-linecap="round"/>
                <path d="M26.7 10.7 11.4 18.6l15.3 7.7z" fill="#f65d57" stroke="currentColor" stroke-width="4.2" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <button class="hint-button" type="button" aria-label="Hint" title="Hint">
            <svg viewBox="0 0 44 44" aria-hidden="true">
              <path d="M15.4 20.2a6.6 6.6 0 1 1 13.2 0c0 2.9-1.9 4.3-3.6 5.8-1 .9-1.3 1.8-1.3 3.1h-3.4c0-2.2.7-3.8 2.3-5.3 1.5-1.3 2.5-2.2 2.5-3.6a3.1 3.1 0 1 0-6.2 0z" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M19.1 32.1h5.8M20.1 35.9h3.8M8.7 21H4.8M39.2 21h-3.9M12.4 11.6 9.7 8.9M31.6 11.6l2.7-2.7" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
            </svg>
            <span>1</span>
          </button>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
