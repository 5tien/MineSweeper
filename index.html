<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#414c57">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minesweeper</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/maskable-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="stage">
      <main class="phone" aria-label="Minesweeper game">
        <header class="topbar">
          <button class="round-button settings-button" type="button" aria-label="Settings" title="Settings">
            <img class="settings-icon" src="assets/settings-cog.svg" alt="" aria-hidden="true">
          </button>

          <div class="counter counter-current">
            <span>CURRENT STREAK</span>
            <strong id="currentStreak">0</strong>
          </div>

          <div class="crowned-counter">
            <svg class="crown" viewBox="0 0 44 18" aria-hidden="true">
              <path d="M0 14h14L22 0l8 14h14v4H0z"/>
            </svg>
            <div class="counter counter-all">
              <span>ALL TIME HIGH</span>
              <strong id="allTime">0</strong>
            </div>
          </div>

          <button class="round-button reset-button" type="button" aria-label="New board" title="New board">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path d="M14.2 19.2A11.2 11.2 0 1 1 13.8 29" fill="none" stroke="currentColor" stroke-width="5.4" stroke-linecap="round"/>
              <path d="M12.5 12.3v9.2h9.2" fill="none" stroke="currentColor" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </header>

        <section id="board" class="board" aria-label="Minesweeper board"></section>

        <footer class="toolbar">
          <div class="mine-pill" aria-label="Mines">
            <img class="bomb-icon" src="assets/bomb.png" alt="" aria-hidden="true">
            <strong id="mineCount">0</strong>
          </div>

          <div class="mode-switch" role="group" aria-label="Tool mode">
            <button id="digMode" class="tool-button" type="button" aria-label="Reveal mode" title="Reveal">
              <img class="shovel-icon" src="assets/shovel.png" alt="" aria-hidden="true">
            </button>
            <button id="flagMode" class="tool-button selected" type="button" aria-label="Flag mode" title="Flag">
              <img class="flag-tool-icon" src="assets/flag-red.png" alt="" aria-hidden="true">
            </button>
          </div>

          <button class="hint-button" type="button" aria-label="Hint" title="Hint">
            <svg viewBox="0 0 44 44" aria-hidden="true">
              <path d="M15.4 20.2a6.6 6.6 0 1 1 13.2 0c0 2.9-1.9 4.3-3.6 5.8-1 .9-1.3 1.8-1.3 3.1h-3.4c0-2.2.7-3.8 2.3-5.3 1.5-1.3 2.5-2.2 2.5-3.6a3.1 3.1 0 1 0-6.2 0z" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M19.1 32.1h5.8M20.1 35.9h3.8M8.7 21H4.8M39.2 21h-3.9M12.4 11.6 9.7 8.9M31.6 11.6l2.7-2.7" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
            </svg>
            <span>1</span>
          </button>
        </footer>

        <div id="settingsPanel" class="settings-overlay" hidden>
          <section class="settings-menu" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-head">
              <h2 id="settingsTitle">SETTINGS</h2>
              <button id="settingsClose" class="settings-close" type="button" aria-label="Close settings" title="Close">
                <svg viewBox="0 0 32 32" aria-hidden="true">
                  <path d="M9 9l14 14M23 9 9 23" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                </svg>
              </button>
            </div>

            <div class="settings-row">
              <span>WIDTH</span>
              <div class="stepper" aria-label="X tiles">
                <button id="colsDown" type="button" aria-label="Decrease width">−</button>
                <strong id="colsValue">9</strong>
                <button id="colsUp" type="button" aria-label="Increase width">+</button>
              </div>
            </div>

            <div class="settings-row">
              <span>HEIGHT</span>
              <div class="stepper" aria-label="Height">
                <button id="rowsDown" type="button" aria-label="Decrease height">−</button>
                <strong id="rowsValue">14</strong>
                <button id="rowsUp" type="button" aria-label="Increase height">+</button>
              </div>
            </div>

            <div class="difficulty-options" role="group" aria-label="Difficulty">
              <button type="button" data-difficulty="easy" aria-pressed="false">EASY</button>
              <button type="button" data-difficulty="normal" aria-pressed="false">NORMAL</button>
              <button type="button" data-difficulty="hard" aria-pressed="false">HARD</button>
              <button type="button" data-difficulty="extreme" aria-pressed="false">EXTREME</button>
            </div>

            <div class="settings-actions">
              <button id="settingsClassic" class="settings-classic" type="button">CLASSIC</button>
              <button id="settingsApply" class="settings-apply" type="button">APPLY</button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
